name: Daily Dashboard Update

on:
  schedule:
    # Roda todo dia às 09:00 UTC (06:00 BRT)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo GitHub (botão "Run workflow")

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily update script
        env:
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASS: ${{ secrets.METABASE_PASS }}
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update dashboard data ($(date +%Y-%m-%d))"
          git push

  # Deploy to GitHub Pages
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # pega o commit mais recente (pós-update)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
