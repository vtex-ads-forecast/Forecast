name: Daily Dashboard Update

on:
  schedule:
    # Roda todo dia às 09:00 UTC (06:00 BRT)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        default: ''
      force:
        description: 'Force update even if data exists (1=yes)'
        required: false
        default: '0'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          clean: true

      - name: Debug - verify update.py version
        run: |
          echo "Lines in update.py: $(wc -l < scripts/update.py)"
          echo "Git commit: $(git rev-parse HEAD)"
          grep -n "advertiser_name" scripts/update.py | head -5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily update script
        env:
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASS: ${{ secrets.METABASE_PASS }}
          FORCE_UPDATE: ${{ github.event.inputs.force || '0' }}
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -n "$START" ] && [ -n "$END" ]; then
            python scripts/update.py "$START" "$END"
          elif [ -n "$START" ]; then
            python scripts/update.py "$START" "$START"
          else
            python scripts/update.py
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update dashboard data ($(date +%Y-%m-%d))"
          git push

  # Deploy to GitHub Pages
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # pega o commit mais recente (pós-update)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
